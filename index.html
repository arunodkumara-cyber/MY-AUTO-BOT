<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD AI AUTO BOT</title>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        .container { border: 2px solid #333; padding: 30px; border-radius: 15px; display: inline-block; background-color: #1a1a1a; }
        h1 { color: #f3ba2f; } /* Binance Yellow Color */
        .status { font-size: 20px; margin: 20px 0; }
        .balance { font-size: 30px; color: #00ff00; font-weight: bold; }
        .btn { padding: 15px 30px; background-color: #f3ba2f; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KD AI AUTO BOT</h1>
        <p class="status">Bot Status: <span style="color: #ff3e3e;">Offline</span></p>
        <div class="balance">Balance: $30.00</div>
        <br>
        <button class="btn">START TRADING</button>
    </div>
</body>
</html>
